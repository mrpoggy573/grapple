<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grapple.io | Space Race</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; color: white; }
        #ui-layer { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 2000; background: #2c3e50; }
        .menu-box { background: #34495e; padding: 40px; border-radius: 20px; text-align: center; border: 4px solid #fff; width: 350px; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 18px; text-align: center; }
        .btn { width: 90%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn-host { background: #e67e22; color: white; }
        .btn-join { background: #3498db; color: white; }
        .btn-start { background: #2ecc71; color: white; display: none; }
        
        #lobby-list { margin: 20px 0; text-align: left; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; min-height: 50px; }
        .player-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #555; }
        .kick-btn { color: #e74c3c; cursor: pointer; font-weight: bold; }

        #hud { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; display: none; }
        #lava-warning { position: absolute; top: 50%; width: 100%; text-align: center; font-size: 40px; color: #ff4400; font-weight: bold; display: none; text-shadow: 0 0 20px #000; }
        #end-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        
        canvas { display: block; }
        .flipped { transform: rotate(180deg); transition: transform 2s ease-in-out; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="menu-box" id="main-menu">
            <h1>GRAPPLE.IO</h1>
            <input type="text" id="pName" placeholder="YOUR NAME" value="Player">
            <button class="btn btn-host" onclick="hostRoom()">HOST GAME</button>
            <hr>
            <input type="text" id="joinCode" placeholder="6-DIGIT CODE">
            <button class="btn btn-join" onclick="joinRoom()">JOIN GAME</button>
        </div>

        <div class="menu-box" id="lobby-menu" style="display:none;">
            <h2 id="room-display">ROOM: ------</h2>
            <div id="lobby-list"></div>
            <button id="start-btn" class="btn btn-start" onclick="startGame()">START GAME</button>
            <p id="wait-msg">Waiting for host...</p>
        </div>
    </div>

    <div id="hud">
        <div id="h-val">HEIGHT: 0m</div>
        <div id="hp-val" style="color:#00ff00">HP: 100</div>
    </div>
    <div id="lava-warning">LAVA IS RISING! SPEED BOOSTED!</div>
    <div id="end-screen"><h1>MISSION COMPLETE: MARS REACHED</h1><button class="btn btn-join" onclick="location.reload()">PLAY AGAIN</button></div>

    <canvas id="gameCanvas"></canvas>

    <script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let peer, conn, myId, isHost = false, roomCode = "";
        let players = {}, connections = {};
        
        // Game State
        let isStarted = false, isGameOver = false;
        let worldWidth = 1000, worldHeight = 100000; // 100k target
        let cameraY = 0, grapplePoints = [], healthOrbs = [];
        let lavaY = worldHeight + 500, lavaSpeed = 0.5;
        let endgameTriggered = false;

        // Player Stats (Exactly as you like them)
        let p = {
            x: 500, y: worldHeight - 150, vx: 0, vy: 0, size: 18, hp: 100,
            jumpForce: 17, wallHops: 5, color: "#00ff00", name: "Player",
            hook: { active: false, target: null, length: 0 }
        };
        let keys = {};

        // --- NETWORK LOGIC ---
        window.hostRoom = () => {
            roomCode = Math.floor(100000 + Math.random() * 900000).toString();
            peer = new Peer('grapple-' + roomCode);
            isHost = true;
            setupPeer();
        };

        window.joinRoom = () => {
            roomCode = document.getElementById('joinCode').value;
            p.name = document.getElementById('pName').value;
            peer = new Peer();
            setupPeer();
        };

        function setupPeer() {
            peer.on('open', id => {
                myId = id;
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('lobby-menu').style.display = 'block';
                document.getElementById('room-display').innerText = "ROOM: " + roomCode;
                
                if (isHost) {
                    document.getElementById('start-btn').style.display = 'block';
                    document.getElementById('wait-msg').style.display = 'none';
                } else {
                    const hostConn = peer.connect('grapple-' + roomCode);
                    handleConnection(hostConn);
                }
            });

            peer.on('connection', handleConnection);
        }

        function handleConnection(connection) {
            connection.on('open', () => {
                connections[connection.peer] = connection;
                connection.on('data', data => {
                    if (data.type === 'kick') location.reload();
                    if (data.type === 'start') realStart();
                    if (data.type === 'sync') players[data.id] = data;
                });
            });
        }

        window.kickPlayer = (id) => {
            if (connections[id]) connections[id].send({type: 'kick'});
            delete players[id];
            updateLobbyUI();
        };

        window.startGame = () => {
            Object.values(connections).forEach(c => c.send({type: 'start'}));
            realStart();
        };

        function realStart() {
            isStarted = true;
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            initWorld();
        }

        // --- GAME LOGIC ---
        function initWorld() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 1500; i++) {
                grapplePoints.push({ x: 100 + Math.random()*800, y: worldHeight - 400 - (i*80), radius: 25 });
            }
        }

        function update() {
            if (!isStarted || isGameOver) return;
            let curH = (worldHeight - p.y) / 10;

            // Death & Respawn
            if (p.hp < 1) { p.y = worldHeight - 150; p.vx = 0; p.vy = 0; p.hp = 100; }

            // Endgame Logic
            if (curH >= 7500 && !endgameTriggered) {
                endgameTriggered = true;
                document.getElementById('lava-warning').style.display = 'block';
                setTimeout(() => document.getElementById('lava-warning').style.display='none', 5000);
            }

            if (endgameTriggered) {
                lavaY -= lavaSpeed;
                lavaSpeed += 0.001; // Accelerates
                p.jumpForce = 25; // Speed boost
                if (p.y > lavaY) p.hp -= 2;
            }

            // Outer Space & Mars
            if (curH >= 10000) {
                isGameOver = true;
                document.body.classList.add('flipped');
                document.getElementById('end-screen').style.display = 'flex';
            }

            // Original Physics
            let gravity = (curH >= 223.5) ? 0 : 0.5; // Changed to match your 2235 meters (scaled)
            if (keys['KeyA']) p.vx -= 0.8; if (keys['KeyD']) p.vx += 0.8;
            if ((keys['Space'] || keys['KeyW']) && curH < 10000) p.vy -= 0.5; // Still able to "jump"/thrust in Zero-G
            
            p.vy += gravity;
            p.vx *= 0.98; p.vy *= 0.99;
            p.x += p.vx; p.y += p.vy;

            // Wall Collisions
            if (p.x < 18 || p.x > 982) { p.vx = 0; p.x = p.x < 18 ? 18 : 982; }
            if (p.y > worldHeight - 18) { p.y = worldHeight - 18; p.vy = 0; }

            // Grapple Logic
            grapplePoints.forEach(gp => {
                let d = Math.hypot(p.x - gp.x, p.y - gp.y);
                if (d < p.size + gp.radius) {
                    let ang = Math.atan2(p.y - gp.y, p.x - gp.x);
                    p.x = gp.x + Math.cos(ang) * (p.size + gp.radius);
                    p.y = gp.y + Math.sin(ang) * (p.size + gp.radius);
                    p.vx *= 0.5; p.vy *= 0.5;
                }
            });

            cameraY = p.y - window.innerHeight / 2;

            // Sync
            if (myId) {
                let data = { type: 'sync', id: myId, x: p.x, y: p.y, name: p.name, h: Math.floor(curH) };
                Object.values(connections).forEach(c => c.send(data));
                players[myId] = data;
            }
            document.getElementById('h-val').innerText = `HEIGHT: ${Math.floor(curH)}m`;
            document.getElementById('hp-val').innerText = `HP: ${Math.floor(p.hp)}`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let curH = (worldHeight - p.y) / 10;
            
            // Sky Color
            let sky = "#000";
            if (curH < 7500) sky = `rgb(0, 0, ${Math.max(0, 100 - curH/20)})`;
            else sky = "#440000"; // Red endgame sky
            ctx.fillStyle = sky; ctx.fillRect(0,0,canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-(p.x - canvas.width/2), -cameraY);

            // Walls
            ctx.fillStyle = "#111";
            ctx.fillRect(-1000, 0, 1000, worldHeight);
            ctx.fillRect(worldWidth, 0, 1000, worldHeight);

            // Grapples
            grapplePoints.forEach(gp => {
                ctx.fillStyle = "#ff5500";
                ctx.beginPath(); ctx.arc(gp.x, gp.y, gp.radius, 0, 7); ctx.fill();
            });

            // Players
            Object.values(players).forEach(pl => {
                ctx.fillStyle = pl.id === myId ? "#00ff00" : "#3498db";
                ctx.beginPath(); ctx.arc(pl.x, pl.y, 18, 0, 7); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.fillText(pl.name, pl.x - 15, pl.y - 25);
            });

            // Lava
            ctx.fillStyle = "rgba(255, 68, 0, 0.8)";
            ctx.fillRect(-1000, lavaY, 3000, worldHeight);

            ctx.restore();
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    })();
    </script>
</body>
</html>
